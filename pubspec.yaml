name: pump_iq
description: Pump IQ
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1

  # Storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media

  # Utilities
  pdf: ^3.11.3
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^12.0.1

  # Device & System
  device_info_plus: ^11.2.0
  app_version_update: ^6.2.0

  # Localization

  flutter_native_splash: ^2.4.7
  pinput: ^6.0.2
  google_fonts: ^8.1.0
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.14.0
  # Code Generation
  build_runner: ^2.12.2
  hive_ce_generator: ^1.11.1
  freezed: ^3.2.5

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - .env
